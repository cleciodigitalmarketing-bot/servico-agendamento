async function hydrateAdMedia(){

 for(const box of loaders){
  try{
   const items=JSON.parse(decodeURIComponent(box.dataset.adCarousel||'%5B%5D'));
   const slides=items.map(item=>({url:item.url||('/api/ad-media/'+encodeURIComponent(item.key)),type:item.type||'video/mp4'}));
   if(!slides.length)continue;
   let index=0,imageTimer=null;
   const show=()=>{if(imageTimer)clearTimeout(imageTimer);box.innerHTML='';const slide=slides[index];const el=document.createElement((slide.type||'').startsWith('video/')?'video':'img');el.src=slide.url;if(el.tagName==='VIDEO'){el.autoplay=true;el.muted=true;el.playsInline=true;el.controls=false;el.preload='metadata';el.setAttribute('playsinline','');el.addEventListener('ended',()=>{index=(index+1)%slides.length;show()});el.addEventListener('canplay',()=>el.play().catch(()=>{}),{once:true})}else{el.alt='Publicidade';imageTimer=setTimeout(()=>{index=(index+1)%slides.length;show()},6000)}box.appendChild(el);if(slides.length>1){const dots=document.createElement('div');dots.className='ad-dots';slides.forEach((_,i)=>{const dot=document.createElement('button');dot.type='button';dot.className=i===index?'active':'';dot.onclick=()=>{index=i;show()};dots.appendChild(dot)});box.appendChild(dots)}};
   show();
  }catch(e){console.error(e)}

function saveService(e){e.preventDefault();const c=company(),sid=serviceId.value,old=sid?c.services.find(x=>x.id===sid):null;const commit=image=>{const data={id:sid||id(),name:serviceName.value,price:Number(servicePrice.value),category:serviceCategory.value,description:serviceDescription.value,image:image??old?.image??''};if(sid)c.services=c.services.map(x=>x.id===sid?data:x);else c.services.unshift(data);save();renderTab();toast('Serviço salvo.');};const f=serviceImage.files[0];f?fileData(f,commit):commit()}
function editService(sid){const s=company().services.find(x=>x.id===sid);serviceId.value=s.id;serviceName.value=s.name;servicePrice.value=s.price;serviceCategory.value=s.category||'Serviço';serviceDescription.value=s.description||'';window.scrollTo({top:0,behavior:'smooth'})}function removeService(sid){if(!confirm('Remover este serviço?'))return;company().services=company().services.filter(x=>x.id!==sid);save();renderTab()}
function collaboratorsTab(){const c=company();return `<h1>Colaboradores</h1><form class="card" onsubmit="saveCollaborator(event)"><input type="hidden" id="collabId"><div class="form-grid"><div class="field"><label>Nome do colaborador</label><input id="collabName" required></div><div class="field"><label>WhatsApp</label><input id="collabPhone" required placeholder="5592999999999"></div></div><div class="field"><label><input id="collabActive" type="checkbox" checked style="width:auto"> Colaborador ativo na vitrine</label></div><h3>Horários disponíveis por dia</h3>${DAYS.map((d,i)=>`<div class="day-row"><b>${d}</b><div><div class="chips" id="dayChips${i}"></div><div class="actions" style="margin-top:8px"><input id="dayInput${i}" type="time" style="max-width:150px;padding:8px;border:1px solid var(--line);border-radius:10px"><button type="button" class="btn small" onclick="addTime(${i})">Adicionar horário</button></div></div></div>`).join('')}<button class="btn primary" style="margin-top:14px">Salvar colaborador</button></form><div>${c.collaborators.map(x=>`<div class="card"><div class="section-head"><div><h3>${esc(x.name)}</h3><p>${esc(x.phone)} • ${x.active===false?'Inativo':'Ativo'}</p></div><div class="actions"><button class="btn small" onclick="editCollaborator('${x.id}')">Editar</button><button class="btn small danger" onclick="removeCollaborator('${x.id}')">Remover</button></div></div>${DAYS.map((d,i)=>x.schedule?.[i]?.length?`<p><b>${d}:</b> ${x.schedule[i].join(', ')}</p>`:'').join('')}</div>`).join('')||'<div class="empty">Nenhum colaborador cadastrado.</div>'}</div>`}
let scheduleDraft={};function addTime(day){const input=document.getElementById('dayInput'+day),v=input.value;if(!v)return;scheduleDraft[day]=[...(scheduleDraft[day]||[]),v].filter((x,i,a)=>a.indexOf(x)===i).sort();input.value='';renderDayChips(day)}function renderDayChips(day){const box=document.getElementById('dayChips'+day);if(box)box.innerHTML=(scheduleDraft[day]||[]).map(t=>`<span class="chip">${t}<button type="button" onclick="removeTime(${day},'${t}')">×</button></span>`).join('')}function removeTime(day,t){scheduleDraft[day]=(scheduleDraft[day]||[]).filter(x=>x!==t);renderDayChips(day)}
function saveCollaborator(e){e.preventDefault();const c=company(),cid=collabId.value,data={id:cid||id(),name:collabName.value.trim(),phone:onlyNumbers(collabPhone.value),active:collabActive.checked,schedule:JSON.parse(JSON.stringify(scheduleDraft))};if(cid)c.collaborators=c.collaborators.map(x=>x.id===cid?data:x);else c.collaborators.push(data);scheduleDraft={};save();renderTab();toast('Colaborador salvo.')}function editCollaborator(cid){const x=company().collaborators.find(v=>v.id===cid);collabId.value=x.id;collabName.value=x.name;collabPhone.value=x.phone;collabActive.checked=x.active!==false;scheduleDraft=JSON.parse(JSON.stringify(x.schedule||{}));DAYS.forEach((_,i)=>renderDayChips(i));window.scrollTo({top:0,behavior:'smooth'})}function removeCollaborator(cid){if(!confirm('Remover colaborador?'))return;company().collaborators=company().collaborators.filter(x=>x.id!==cid);save();renderTab()}
function appearanceTab(){const c=company(),t=c.theme;return `<h1>Aparência e dados da empresa</h1><form class="card" onsubmit="saveAppearance(event)"><div class="form-grid"><div class="field"><label>Nome da empresa</label><input id="aName" value="${esc(c.name)}"></div><div class="field"><label>Segmento</label><input id="aCategory" value="${esc(c.category)}"></div><div class="field"><label>WhatsApp principal</label><input id="aPhone" value="${esc(c.phone)}"></div><div class="field"><label>Logo</label><input id="aLogo" type="file" accept="image/*"><small class="upload-guide">Logo recomendada: 1000 × 1000 px em PNG.</small></div><div class="field"><label>Banner</label><input id="aBanner" type="file" accept="image/*"><small class="upload-guide">Banner recomendado: 1600 × 600 px.</small></div><div class="field full"><label>Descrição</label><textarea id="aDescription">${esc(c.description)}</textarea></div></div><h3>Personalização dos cards e formulário</h3><div class="color-grid">${colorField('pageBg','Fundo da área de serviços',t.pageBg)}${colorField('headingText','Letras de “Serviços disponíveis”',t.headingText)}${colorField('cardBg','Fundo dos cards',t.cardBg)}${colorField('cardText','Título e preço dos cards',t.cardText)}${colorField('descriptionText','Letra da descrição',t.descriptionText)}${colorField('buttonBg','Fundo dos botões',t.buttonBg)}${colorField('buttonText','Letras dos botões',t.buttonText)}${colorField('formBg','Fundo do formulário',t.formBg)}${colorField('formText','Letras do formulário',t.formText)}</div><button class="btn primary" style="margin-top:16px">Salvar personalização</button></form>`}function colorField(id,label,val){return `<div class="color-item"><label>${label}</label><input id="${id}" type="color" value="${val}"></div>`}
function saveAppearance(e){e.preventDefault();const c=company();c.name=aName.value;c.category=aCategory.value;c.phone=onlyNumbers(aPhone.value);c.description=aDescription.value;c.theme={pageBg:pageBg.value,headingText:headingText.value,cardBg:cardBg.value,cardText:cardText.value,descriptionText:descriptionText.value,buttonBg:buttonBg.value,buttonText:buttonText.value,formBg:formBg.value,formText:formText.value};const files=[['logo',aLogo.files[0]],['banner',aBanner.files[0]]].filter(x=>x[1]);if(!files.length){save();renderDashboard();toast('Personalização salva.');return}let done=0;files.forEach(([k,f])=>fileData(f,data=>{c[k]=data;if(++done===files.length){save();renderDashboard();toast('Personalização salva.')}}))}

function siteAppearanceTab(){const t=state.siteTheme,a=state.ads;return `<h1>Layout geral e publicidade</h1><p class="hint">Estas cores alteram o cabeçalho, fundo, painéis, textos e botões do site. A área interna de serviços de cada empresa continua usando a personalização própria da empresa.</p><form class="card" onsubmit="saveSiteAppearance(event)"><h3>Logo principal do site</h3><div class="field"><label>Trocar logo do cabeçalho</label><input id="siteLogoFile" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml"><small class="media-note">Recomendado: PNG ou WebP transparente, formato quadrado, 1000 × 1000 px.</small></div><h3>Cores gerais do AgendaPro Business</h3><div class="color-grid">${siteColor('sgBg','Fundo principal',t.bg)}${siteColor('sgBgTop','Topo do fundo',t.bgTop)}${siteColor('sgHeader','Cabeçalho',t.header)}${siteColor('sgPanel','Painéis e cartões',t.panel)}${siteColor('sgText','Textos principais',t.text)}${siteColor('sgMuted','Textos secundários',t.muted)}${siteColor('sgBorder','Bordas',t.border)}${siteColor('sgPrimary','Botões principais',t.primary)}${siteColor('sgButtonText','Letras dos botões',t.buttonText)}</div><div class="theme-section"><h3>Cores dos espaços publicitários</h3><div class="color-grid">${siteColor('sgAdBg','Fundo dos anúncios',t.adBg)}${siteColor('sgAdText','Texto dos anúncios',t.adText)}${siteColor('sgAdAccent','Destaques dos anúncios',t.adAccent)}</div></div><div class="theme-section"><h3>Carrosséis de anúncios</h3><p class="hint">Você pode selecionar vários vídeos de uma vez. Eles serão exibidos na ordem do upload e, ao terminar o último, a sequência recomeça automaticamente.</p>${a.map((ad,i)=>`<div class="card ad-config-card"><h3>${i<2?'Anúncio esquerdo '+(i+1):'Anúncio vertical direito'}</h3><div class="form-grid"><div class="field"><label>Título</label><input id="adTitle${i}" value="${esc(ad.title)}"></div><div class="field"><label>Texto</label><input id="adSubtitle${i}" value="${esc(ad.subtitle)}"></div><div class="field full"><label>Adicionar vídeos ao carrossel</label><input id="adMedia${i}" type="file" accept="video/mp4,video/webm,video/ogg,video/*" multiple><small class="media-note">Selecione vários arquivos. Os vídeos serão armazenados no Cloudflare R2. Recomendado: MP4, até 80 MB por vídeo.</small></div></div>${(ad.mediaItems||[]).length?`<div class="ad-file-list">${ad.mediaItems.map((item,j)=>`<div><span><b>${j+1}. ${esc(item.name||'Vídeo')}</b><small>${esc(item.type||'video')}</small></span><button type="button" class="btn small danger" onclick="removeAdMedia(${i},'${item.key}')">Remover</button></div>`).join('')}</div>`:'<div class="empty compact">Nenhum vídeo cadastrado neste espaço.</div>'}</div>`).join('')}</div><button class="btn primary" style="margin-top:16px">Salvar layout e anúncios</button></form><h2>Prévia dos anúncios</h2><div class="support-preview">${a.map(x=>adCardHtml(x)).join('')}</div>`}
function siteColor(id,label,val){return `<div class="color-item"><label>${label}</label><input id="${id}" type="color" value="${val}"></div>`}
async function saveSiteAppearance(e){e.preventDefault();const oldLogo=state.siteTheme?.logo||'';state.siteTheme={logo:oldLogo,bg:sgBg.value,bgTop:sgBgTop.value,header:sgHeader.value,panel:sgPanel.value,text:sgText.value,muted:sgMuted.value,border:sgBorder.value,primary:sgPrimary.value,buttonText:sgButtonText.value,adBg:sgAdBg.value,adText:sgAdText.value,adAccent:sgAdAccent.value};try{const logoFile=document.getElementById('siteLogoFile')?.files[0];if(logoFile){if(logoFile.size>3*1024*1024)throw new Error('A logo deve ter no máximo 3 MB.');state.siteTheme.logo=await new Promise(resolve=>fileData(logoFile,resolve))}for(let i=0;i<state.ads.length;i++){const ad=state.ads[i];ad.title=document.getElementById('adTitle'+i).value;ad.subtitle=document.getElementById('adSubtitle'+i).value;ad.mediaItems=ad.mediaItems||[];const files=[...document.getElementById('adMedia'+i).files];for(const f of files){if(f.size>80*1024*1024)throw new Error('O vídeo '+f.name+' ultrapassa 80 MB.');if(!f.type.startsWith('video/'))throw new Error('Selecione somente vídeos para o anúncio '+(i+1)+'.');toast('Enviando '+f.name+' para o Cloudflare R2...');const item=await uploadAdVideo(i,f);ad.mediaItems.push(item)}ad.media='';ad.mediaKey=''}await apiRequest(ADS_API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ads:state.ads.map((a,i)=>({slot:i,title:a.title,subtitle:a.subtitle}))}),admin:true});save();renderDashboard();toast('Layout salvo e vídeos armazenados no Cloudflare R2.')}catch(err){toast(err.message||'Não foi possível salvar o arquivo.')}}
async function removeAdMedia(adIndex,key){if(!confirm('Remover este vídeo do Cloudflare R2?'))return;try{await apiRequest('/api/media/'+encodeURIComponent(key),{method:'DELETE',admin:true});const ad=state.ads[adIndex];ad.mediaItems=(ad.mediaItems||[]).filter(item=>item.key!==key);save();renderDashboard();toast('Vídeo removido do R2 e do carrossel.')}catch(err){toast(err.message)}}

function companiesTab(){return `<h1>Empresas cadastradas</h1><form class="card form-grid" onsubmit="saveCompanySupport(event)"><div class="field"><label>Nome</label><input id="scName" required></div><div class="field"><label>Segmento</label><input id="scCategory" required></div><div class="field"><label>Usuário</label><input id="scLogin" required></div><div class="field"><label>Senha</label><input id="scPass" value="123456" required></div><div class="field full"><label>WhatsApp</label><input id="scPhone"></div><button class="btn primary full">Criar empresa</button></form><div class="table-wrap"><table class="table"><thead><tr><th>Empresa</th><th>Login</th><th>Serviços</th><th>Colaboradores</th><th>Ações</th></tr></thead><tbody>${state.companies.map(c=>`<tr><td>${esc(c.name)}<br><small>${esc(c.category)}</small></td><td>${esc(c.login)}</td><td>${c.services.length}</td><td>${c.collaborators.length}</td><td><button class="btn small danger" onclick="removeCompany('${c.id}')">Remover</button></td></tr>`).join('')}</tbody></table></div>`}function saveCompanySupport(e){e.preventDefault();state.companies.push({id:id(),name:scName.value,category:scCategory.value,login:scLogin.value,pass:scPass.value,phone:onlyNumbers(scPhone.value),logo:'',banner:'',description:'Nova empresa cadastrada na plataforma.',theme:{...defaultTheme},services:[],collaborators:[]});save();renderTab();toast('Empresa criada.')}function removeCompany(cid){if(!confirm('Remover empresa e todos os seus agendamentos?'))return;state.companies=state.companies.filter(x=>x.id!==cid);state.appointments=state.appointments.filter(x=>x.companyId!==cid);save();renderTab()}
applySiteTheme();renderPublic();syncAdsFromCloud();
</script>
