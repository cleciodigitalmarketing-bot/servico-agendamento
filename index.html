<title>AgendaPro Business</title>
<style>
:root{--bg:#eef5fb;--panel:#fff;--text:#162033;--muted:#667085;--line:#dbe5ef;--primary:#4f7cff;--danger:#dc2626;--success:#16a34a;--warning:#d97706;--shadow:0 18px 50px rgba(36,53,78,.12)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f7fbff,var(--bg));color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.nav{max-width:1240px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;gap:18px;align-items:center}.brand{display:flex;gap:12px;align-items:center;border:0;background:none;color:var(--text)}.brand-logo{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#4f7cff,#67d3ff);color:white;font-weight:900}.brand b{font-size:19px}.brand small{display:block;color:var(--muted);margin-top:2px}.nav-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:white;color:var(--text);padding:11px 15px;border-radius:14px;font-weight:800}.btn:hover{transform:translateY(-1px)}.btn.primary{background:var(--primary);color:white;border-color:var(--primary)}.btn.danger{background:#fff1f2;color:#b91c1c;border-color:#fecdd3}.btn.success{background:#ecfdf3;color:#166534;border-color:#bbf7d0}.btn.warning{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.btn.small{padding:8px 10px;border-radius:10px;font-size:13px}.wrap{max-width:1240px;margin:28px auto;padding:0 20px}.market{display:grid;grid-template-columns:300px 1fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.sidebar{padding:18px;height:max-content;position:sticky;top:96px}.search{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);outline:0}.company-list{display:grid;gap:10px;margin-top:14px}.company-item{display:flex;align-items:center;gap:11px;width:100%;padding:12px;border:1px solid var(--line);background:white;border-radius:16px;text-align:left}.company-item.active{background:#f2f6ff;border-color:#b9cbff}.logo{width:52px;height:52px;border-radius:15px;object-fit:cover;background:#eaf1ff;display:grid;place-items:center;font-weight:900;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.company-item small{display:block;color:var(--muted);margin-top:3px}.store{overflow:hidden;--store-bg:#ffffff;--card-bg:#ffffff;--card-text:#162033;--button-bg:#4f7cff;--button-text:#ffffff;--form-bg:#f8fafc;--form-text:#162033}.hero{min-height:220px;padding:28px;display:flex;align-items:end;gap:16px;background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(255,255,255,.92)),var(--banner);background-size:cover;background-position:center}.hero .logo{width:92px;height:92px;border-radius:24px;flex:0 0 auto}.hero h1{margin:0;font-size:36px}.hero p{margin:8px 0 0;color:#5d6b82;line-height:1.5}.store-body{padding:24px;background:var(--store-bg)}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:16px}.section-head h2{margin:0}.section-head p{color:var(--muted);margin:5px 0 0}.service-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.service-card{overflow:hidden;padding:0;border-radius:20px;border:2px solid transparent;background:var(--card-bg);color:var(--card-text);box-shadow:0 10px 28px rgba(30,50,80,.08);text-align:left}.service-card.active{border-color:var(--button-bg)}.service-img{height:150px;background:#eaf8fb;display:grid;place-items:center;font-size:42px}.service-img img{width:100%;height:100%;object-fit:cover}.service-content{padding:16px}.service-content h3{margin:0 0 8px}.service-content p{color:inherit;opacity:.72;line-height:1.45;min-height:58px}.service-foot{display:flex;justify-content:space-between;align-items:center;gap:10px}.service-foot strong{font-size:18px}.service-card .card-btn{background:var(--button-bg);color:var(--button-text);border:0;border-radius:12px;padding:9px 12px;font-weight:900}.booking{margin-top:24px;padding:22px;border:1px solid var(--line);border-radius:22px;background:var(--form-bg);color:var(--form-text)}.booking h2{margin-top:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:14px}.field label{display:block;font-size:13px;font-weight:900;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1px solid #d6e0ea;border-radius:14px;background:white;color:#162033;outline:0}.field textarea{min-height:100px;resize:vertical}.collab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.collab-choice{padding:14px;border:2px solid var(--line);border-radius:16px;background:white;text-align:left}.collab-choice.active{border-color:var(--button-bg);background:#f7f9ff}.slots{display:flex;flex-wrap:wrap;gap:10px}.slot{padding:10px 13px;border:1px solid #bbf7d0;background:#ecfdf3;color:#166534;border-radius:12px;font-weight:900}.slot.busy{background:#fee2e2;border-color:#fecaca;color:#b91c1c;cursor:not-allowed}.slot.active{outline:3px solid rgba(79,124,255,.25);border-color:var(--button-bg)}.submit{width:100%;padding:14px;border:0;border-radius:14px;background:var(--button-bg);color:var(--button-text);font-weight:900}.auth{max-width:480px;margin:60px auto;padding:28px}.auth h1{margin-top:0}.dashboard{display:grid;grid-template-columns:240px 1fr;gap:20px}.menu{padding:14px;height:max-content;position:sticky;top:96px}.menu button{width:100%;text-align:left;margin-bottom:8px}.content{padding:22px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{padding:18px;border:1px solid var(--line);border-radius:18px;background:white}.stat b{font-size:28px;display:block}.stat span{color:var(--muted)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}.status{display:inline-block;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900}.status.pending{background:#fff7ed;color:#9a3412}.status.confirmed{background:#eff6ff;color:#1d4ed8}.status.completed{background:#ecfdf3;color:#166534}.status.cancelled{background:#f3f4f6;color:#4b5563}.actions{display:flex;flex-wrap:wrap;gap:7px}.card{padding:18px;border:1px solid var(--line);border-radius:18px;background:white;margin-bottom:14px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.full{grid-column:1/-1}.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.color-item{padding:12px;border:1px solid var(--line);border-radius:14px}.color-item input{width:100%;height:44px;padding:2px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.chip{display:flex;align-items:center;gap:6px;background:#eef4ff;padding:7px 9px;border-radius:999px}.chip button{border:0;background:none;color:#b91c1c;font-weight:900}.day-row{display:grid;grid-template-columns:110px 1fr;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid var(--line)}.empty{padding:24px;border:1px dashed #cbd5e1;border-radius:18px;text-align:center;color:var(--muted)}.toast{position:fixed;right:18px;bottom:18px;z-index:100;background:#172033;color:#fff;padding:14px 18px;border-radius:14px;font-weight:800;box-shadow:var(--shadow)}footer{text-align:center;color:var(--muted);padding:36px 16px}.hint{font-size:12px;color:var(--muted)}@media(max-width:900px){.market,.dashboard{grid-template-columns:1fr}.sidebar,.menu{position:static}.service-grid,.collab-grid,.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.nav{align-items:flex-start;flex-direction:column}.service-grid,.collab-grid,.stats,.grid2,.form-grid,.color-grid{grid-template-columns:1fr}.hero{align-items:flex-start;flex-direction:column}.hero h1{font-size:29px}.day-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="topbar"><div class="nav"><button class="brand" onclick="showPublic()"><span class="brand-logo">AP</span><span><b>AgendaPro Business</b><small>Vitrine digital + agendamentos para empresas</small></span></button><div class="nav-actions"><button class="btn" onclick="showPublic()">Explorar empresas</button><button class="btn" onclick="showLogin('provider')">Área da Empresa</button><button class="btn primary" onclick="showLogin('support')">Área de Suporte</button></div></div></header>
<div id="app"></div><div id="toast" class="toast hidden"></div><footer>AgendaPro Business — sistema de agendamento personalizável para Cloudflare Pages.</footer>
<script>
const STORE='agendapro_business_v2';
const DAYS=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const DEFAULT_TIMES=['09:00','10:00','11:00','12:00','14:00','15:00','16:00','17:00'];
const defaultTheme={pageBg:'#ffffff',cardBg:'#ffffff',cardText:'#162033',buttonBg:'#4f7cff',buttonText:'#ffffff',formBg:'#f8fafc',formText:'#162033'};
const demo={companies:[{id:'wm',name:'Barbearia W.M',category:'Barbearia e estética masculina',login:'wm',pass:'123456',phone:'5592981207070',logo:'',banner:'',description:'Espaço masculino moderno para corte, barba, pigmentação, relaxamento e atendimento VIP.',theme:{...defaultTheme},services:[{id:'s1',name:'Corte Degradê',price:45,description:'Corte moderno com acabamento profissional e finalização.',category:'Serviço',image:''},{id:'s2',name:'Barba Premium',price:40,description:'Toalha quente, desenho e produtos de alta performance.',category:'Serviço',image:''}],collaborators:[{id:'c1',name:'Junior',phone:'5592981111111',active:true,schedule:{1:['09:00','10:00','11:00','12:00'],2:['09:00','10:00','11:00','12:00'],3:['09:00','10:00','11:00','12:00'],4:['09:00','10:00','11:00','12:00'],5:['09:00','10:00','11:00','12:00'],6:['09:00','10:00','11:00']}}]}],appointments:[]};
let state=loadState(),selectedCompanyId=state.companies[0]?.id||null,currentUser=null,currentTab='overview';
function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORE)||'null');if(saved)return normalize(saved);const old=JSON.parse(localStorage.getItem('agendapro_premium_v1')||'null');if(old?.companies){return normalize({companies:old.companies.map(c=>({id:c.id,name:c.name,category:c.category,login:c.login,pass:c.pass,phone:c.phone,logo:c.logo?.startsWith('data:')?c.logo:'',banner:c.banner||'',description:c.desc||'',theme:{...defaultTheme,buttonBg:c.primary||defaultTheme.buttonBg},services:(c.products||[]).map(p=>({id:p.id,name:p.name,price:Number(p.price)||0,description:p.desc||'',category:'Serviço',image:p.img?.startsWith('data:')?p.img:''})),collaborators:[]})),appointments:(old.appointments||[]).map(a=>({...a,companyId:a.companyId,serviceId:a.productId,serviceName:a.productName,clientName:a.customer,clientPhone:a.phone,date:a.date,time:a.time,status:a.status==='ok'?'confirmed':'pending'}))});}return structuredClone(demo)}catch{return structuredClone(demo)}}
function normalize(s){s.companies=(s.companies||[]).map(c=>({...c,theme:{...defaultTheme,...(c.theme||{})},services:c.services||c.products||[],collaborators:(c.collaborators||[]).map(x=>({...x,schedule:x.schedule||{}}))}));s.appointments=s.appointments||[];return s}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}function id(){return crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.random()}function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function onlyNumbers(v){return String(v||'').replace(/\D/g,'')}function dateBR(v){if(!v)return'';const [y,m,d]=v.split('-');return `${d}/${m}/${y}`}function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2800)}function fileData(file,cb){if(!file)return;const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file)}function company(){return state.companies.find(c=>c.id===currentUser?.companyId)}function selectedCompany(){return state.companies.find(c=>c.id===selectedCompanyId)||state.companies[0]}
function showPublic(){currentUser=null;renderPublic()}
function renderPublic(){const c=selectedCompany();if(!c){document.getElementById('app').innerHTML='<div class="wrap empty">Nenhuma empresa cadastrada.</div>';return}document.getElementById('app').innerHTML=`<main class="wrap market"><aside class="panel sidebar"><input class="search" placeholder="Buscar empresa..." oninput="filterCompanies(this.value)"><div id="companyList" class="company-list">${companyListHtml('')}</div></aside><section id="storeArea">${storeHtml(c)}</section></main>`}
function companyListHtml(q){return state.companies.filter(c=>(c.name+' '+c.category).toLowerCase().includes(q.toLowerCase())).map(c=>`<button class="company-item ${c.id===selectedCompanyId?'active':''}" onclick="selectCompany('${c.id}')"><span class="logo">${c.logo?`<img src="${c.logo}">`:esc(c.name.slice(0,2).toUpperCase())}</span><span><b>${esc(c.name)}</b><small>${esc(c.category)}</small></span></button>`).join('')}
function filterCompanies(q){document.getElementById('companyList').innerHTML=companyListHtml(q)}function selectCompany(cid){selectedCompanyId=cid;renderPublic()}
function storeHtml(c){const t=c.theme;return `<section class="panel store" style="--store-bg:${t.pageBg};--card-bg:${t.cardBg};--card-text:${t.cardText};--button-bg:${t.buttonBg};--button-text:${t.buttonText};--form-bg:${t.formBg};--form-text:${t.formText};--banner:url('${c.banner||''}')"><div class="hero"><span class="logo">${c.logo?`<img src="${c.logo}">`:esc(c.name.slice(0,2).toUpperCase())}</span><div><h1>${esc(c.name)}</h1><p>${esc(c.description||c.category)}</p></div></div><div class="store-body"><div class="section-head"><div><h2>Serviços disponíveis</h2><p>Selecione um serviço para iniciar o agendamento.</p></div></div><div class="service-grid">${c.services.length?c.services.map(s=>`<button class="service-card" onclick="openBooking('${c.id}','${s.id}')"><div class="service-img">${s.image?`<img src="${s.image}">`:'✂️'}</div><div class="service-content"><h3>${esc(s.name)}</h3><p>${esc(s.description)}</p><div class="service-foot"><strong>${money(s.price)}</strong><span class="card-btn">Agendar</span></div></div></button>`).join(''):'<div class="empty">Essa empresa ainda não cadastrou serviços.</div>'}</div><div id="bookingArea"></div></div></section>`}
function openBooking(companyId,serviceId){const c=state.companies.find(x=>x.id===companyId),s=c.services.find(x=>x.id===serviceId);document.getElementById('bookingArea').innerHTML=`<form class="booking" onsubmit="submitBooking(event,'${companyId}','${serviceId}')"><h2>Solicitar agendamento — ${esc(s.name)}</h2><div class="grid2"><div class="field"><label>Nome do cliente</label><input id="bName" required></div><div class="field"><label>WhatsApp do cliente</label><input id="bPhone" required placeholder="5592999999999"></div></div><div class="field"><label>Escolha o colaborador</label><div class="collab-grid">${c.collaborators.filter(x=>x.active!==false).map(x=>`<button type="button" class="collab-choice" data-collab="${x.id}" onclick="chooseCollab('${x.id}')"><b>${esc(x.name)}</b><small style="display:block;color:#667085;margin-top:5px">Clique para visualizar a agenda</small></button>`).join('')||'<div class="empty">Nenhum colaborador ativo cadastrado.</div>'}</div><input type="hidden" id="bCollab"></div><div class="field"><label>Data</label><input id="bDate" type="date" min="${new Date().toISOString().slice(0,10)}" required onchange="renderSlots('${companyId}')"></div><div class="field"><label>Horários do colaborador</label><div id="slotArea" class="slots"><span class="hint">Selecione primeiro o colaborador e a data.</span></div><input type="hidden" id="bTime"></div><div class="field"><label>Observação</label><textarea id="bObs" placeholder="Informações adicionais do atendimento"></textarea></div><button class="submit" type="submit">Confirmar solicitação</button></form>`;document.getElementById('bookingArea').scrollIntoView({behavior:'smooth',block:'start'})}
function chooseCollab(cid){document.getElementById('bCollab').value=cid;document.querySelectorAll('.collab-choice').forEach(x=>x.classList.toggle('active',x.dataset.collab===cid));renderSlots(selectedCompanyId)}
function renderSlots(companyId){const c=state.companies.find(x=>x.id===companyId),cid=document.getElementById('bCollab')?.value,date=document.getElementById('bDate')?.value,box=document.getElementById('slotArea');if(!cid||!date){box.innerHTML='<span class="hint">Selecione primeiro o colaborador e a data.</span>';return}const col=c.collaborators.find(x=>x.id===cid),day=new Date(date+'T12:00:00').getDay(),times=col.schedule?.[day]||[];box.innerHTML=times.length?times.map(time=>{const busy=state.appointments.some(a=>a.companyId===companyId&&a.collaboratorId===cid&&a.date===date&&a.time===time&&!['completed','cancelled'].includes(a.status));return `<button type="button" class="slot ${busy?'busy':''}" ${busy?'disabled':''} onclick="chooseSlot('${time}',this)">${time}${busy?' • Ocupado':''}</button>`}).join(''):'<span class="hint">Esse colaborador não cadastrou horários para esta data.</span>'}
function chooseSlot(time,el){document.getElementById('bTime').value=time;document.querySelectorAll('.slot').forEach(x=>x.classList.remove('active'));el.classList.add('active')}
function submitBooking(e,companyId,serviceId){e.preventDefault();const c=state.companies.find(x=>x.id===companyId),s=c.services.find(x=>x.id===serviceId),collabId=bCollab.value,time=bTime.value;if(!collabId||!time)return toast('Selecione o colaborador e um horário disponível.');const col=c.collaborators.find(x=>x.id===collabId);const ap={id:id(),companyId,serviceId,serviceName:s.name,servicePrice:s.price,collaboratorId:collabId,collaboratorName:col.name,clientName:bName.value.trim(),clientPhone:onlyNumbers(bPhone.value),date:bDate.value,time,notes:bObs.value.trim(),status:'pending',createdAt:new Date().toISOString()};state.appointments.unshift(ap);save();toast('Agendamento registrado com sucesso.');const msg=`📅 *Novo agendamento*\n\nEmpresa: ${c.name}\nCliente: ${ap.clientName}\nWhatsApp: ${ap.clientPhone}\nServiço: ${ap.serviceName}\nColaborador: ${ap.collaboratorName}\nData: ${dateBR(ap.date)}\nHorário: ${ap.time}\nObservação: ${ap.notes||'Sem observação'}`;if(onlyNumbers(col.phone).length>=10)window.open(`https://wa.me/${onlyNumbers(col.phone)}?text=${encodeURIComponent(msg)}`,'_blank');openBooking(companyId,serviceId)}
function showLogin(mode){document.getElementById('app').innerHTML=`<section class="wrap"><form class="panel auth" onsubmit="doLogin(event,'${mode}')"><h1>${mode==='support'?'Área de Suporte':'Área da Empresa'}</h1><p>${mode==='support'?'Gerencie as empresas cadastradas na plataforma.':'Acesse serviços, colaboradores, agenda e personalização.'}</p><div class="field"><label>Usuário</label><input id="loginUser" required></div><div class="field"><label>Senha</label><input id="loginPass" type="password" required></div><button class="btn primary" style="width:100%">Entrar</button><p class="hint">${mode==='support'?'Demonstração: suporte / 123456':'Demonstração: wm / 123456'}</p></form></section>`}
function doLogin(e,mode){e.preventDefault();if(mode==='support'&&loginUser.value==='suporte'&&loginPass.value==='123456'){currentUser={type:'support'};renderDashboard();return}const c=state.companies.find(x=>x.login===loginUser.value&&x.pass===loginPass.value);if(!c)return toast('Usuário ou senha inválidos.');currentUser={type:'provider',companyId:c.id};currentTab='overview';renderDashboard()}
function renderDashboard(){const provider=currentUser.type==='provider',c=provider?company():null;const tabs=provider?[['overview','Visão geral'],['appointments','Agendamentos'],['services','Serviços'],['collaborators','Colaboradores'],['appearance','Aparência']]:[['companies','Empresas']];document.getElementById('app').innerHTML=`<main class="wrap dashboard"><aside class="panel menu"><h3>${provider?esc(c.name):'Suporte SaaS'}</h3>${tabs.map(([id,label])=>`<button class="btn ${currentTab===id?'primary':''}" onclick="openTab('${id}')">${label}</button>`).join('')}<button class="btn danger" onclick="showPublic()">Sair</button></aside><section class="panel content" id="dashContent"></section></main>`;renderTab()}
function openTab(t){currentTab=t;renderDashboard()}function renderTab(){const el=document.getElementById('dashContent');if(currentUser.type==='support')el.innerHTML=companiesTab();else if(currentTab==='overview')el.innerHTML=overviewTab();else if(currentTab==='appointments')el.innerHTML=appointmentsTab();else if(currentTab==='services')el.innerHTML=servicesTab();else if(currentTab==='collaborators')el.innerHTML=collaboratorsTab();else if(currentTab==='appearance')el.innerHTML=appearanceTab()}
function overviewTab(){const c=company(),aps=state.appointments.filter(a=>a.companyId===c.id);return `<h1>Painel da empresa</h1><div class="stats"><div class="stat"><b>${c.services.length}</b><span>Serviços</span></div><div class="stat"><b>${c.collaborators.length}</b><span>Colaboradores</span></div><div class="stat"><b>${aps.filter(a=>a.status==='pending').length}</b><span>Pendentes</span></div><div class="stat"><b>${aps.filter(a=>a.status==='confirmed').length}</b><span>Confirmados</span></div></div><div class="card"><h2>Fluxo atualizado</h2><p>Cadastre colaboradores, defina os horários de cada dia, personalize os cards e o formulário, e acompanhe os agendamentos. Horários ocupados ficam vermelhos na vitrine. Ao finalizar ou cancelar um atendimento, o horário volta a ficar disponível sem apagar o histórico.</p></div>`}
function appointmentsTab(){const aps=state.appointments.filter(a=>a.companyId===company().id);return `<div class="section-head"><div><h1>Agendamentos</h1><p>Confirme, finalize, cancele ou remova registros.</p></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Cliente</th><th>Serviço</th><th>Colaborador</th><th>Data e hora</th><th>Status</th><th>Ações</th></tr></thead><tbody>${aps.map(a=>`<tr><td><b>${esc(a.clientName)}</b><br><small>${esc(a.clientPhone)}</small></td><td>${esc(a.serviceName)}</td><td>${esc(a.collaboratorName)}</td><td>${dateBR(a.date)}<br>${a.time}</td><td><span class="status ${a.status}">${statusLabel(a.status)}</span></td><td><div class="actions">${a.status==='pending'?`<button class="btn small success" onclick="setStatus('${a.id}','confirmed')">Confirmar</button>`:''}${!['completed','cancelled'].includes(a.status)?`<button class="btn small primary" onclick="setStatus('${a.id}','completed')">Finalizar</button><button class="btn small warning" onclick="setStatus('${a.id}','cancelled')">Cancelar</button>`:''}<button class="btn small" onclick="messageClient('${a.id}')">WhatsApp</button><button class="btn small danger" onclick="removeAppointment('${a.id}')">Remover</button></div></td></tr>`).join('')}</tbody></table></div>${aps.length?'':'<div class="empty">Nenhum agendamento recebido.</div>'}`}
function statusLabel(s){return({pending:'Aguardando',confirmed:'Confirmado',completed:'Finalizado',cancelled:'Cancelado'})[s]||s}function setStatus(aid,status){const a=state.appointments.find(x=>x.id===aid);a.status=status;save();renderTab();toast('Status atualizado.')}function removeAppointment(aid){if(!confirm('Remover este agendamento definitivamente?'))return;state.appointments=state.appointments.filter(x=>x.id!==aid);save();renderTab()}function messageClient(aid){const a=state.appointments.find(x=>x.id===aid),c=company();const msg=`Olá ${a.clientName}, seu agendamento de ${a.serviceName} com ${a.collaboratorName} está marcado para ${dateBR(a.date)} às ${a.time}. Status: ${statusLabel(a.status)}. — ${c.name}`;window.open(`https://wa.me/${onlyNumbers(a.clientPhone)}?text=${encodeURIComponent(msg)}`,'_blank')}
function servicesTab(){const c=company();return `<h1>Serviços</h1><form class="card form-grid" onsubmit="saveService(event)"><input type="hidden" id="serviceId"><div class="field"><label>Nome</label><input id="serviceName" required></div><div class="field"><label>Valor</label><input id="servicePrice" type="number" step="0.01" required></div><div class="field"><label>Categoria</label><select id="serviceCategory"><option>Serviço</option><option>Produto</option><option>Bebida</option></select></div><div class="field"><label>Imagem</label><input id="serviceImage" type="file" accept="image/*"></div><div class="field full"><label>Descrição</label><textarea id="serviceDescription"></textarea></div><button class="btn primary full">Salvar serviço</button></form><div class="service-grid">${c.services.map(s=>`<article class="service-card"><div class="service-img">${s.image?`<img src="${s.image}">`:'✂️'}</div><div class="service-content"><h3>${esc(s.name)}</h3><p>${esc(s.description)}</p><div class="service-foot"><strong>${money(s.price)}</strong><div class="actions"><button class="btn small" onclick="editService('${s.id}')">Editar</button><button class="btn small danger" onclick="removeService('${s.id}')">Remover</button></div></div></div></article>`).join('')}</div>`}
function saveService(e){e.preventDefault();const c=company(),sid=serviceId.value,old=sid?c.services.find(x=>x.id===sid):null;const commit=image=>{const data={id:sid||id(),name:serviceName.value,price:Number(servicePrice.value),category:serviceCategory.value,description:serviceDescription.value,image:image??old?.image??''};if(sid)c.services=c.services.map(x=>x.id===sid?data:x);else c.services.unshift(data);save();renderTab();toast('Serviço salvo.');};const f=serviceImage.files[0];f?fileData(f,commit):commit()}
function editService(sid){const s=company().services.find(x=>x.id===sid);serviceId.value=s.id;serviceName.value=s.name;servicePrice.value=s.price;serviceCategory.value=s.category||'Serviço';serviceDescription.value=s.description||'';window.scrollTo({top:0,behavior:'smooth'})}function removeService(sid){if(!confirm('Remover este serviço?'))return;company().services=company().services.filter(x=>x.id!==sid);save();renderTab()}
function collaboratorsTab(){const c=company();return `<h1>Colaboradores</h1><form class="card" onsubmit="saveCollaborator(event)"><input type="hidden" id="collabId"><div class="form-grid"><div class="field"><label>Nome do colaborador</label><input id="collabName" required></div><div class="field"><label>WhatsApp</label><input id="collabPhone" required placeholder="5592999999999"></div></div><div class="field"><label><input id="collabActive" type="checkbox" checked style="width:auto"> Colaborador ativo na vitrine</label></div><h3>Horários disponíveis por dia</h3>${DAYS.map((d,i)=>`<div class="day-row"><b>${d}</b><div><div class="chips" id="dayChips${i}"></div><div class="actions" style="margin-top:8px"><input id="dayInput${i}" type="time" style="max-width:150px;padding:8px;border:1px solid var(--line);border-radius:10px"><button type="button" class="btn small" onclick="addTime(${i})">Adicionar horário</button></div></div></div>`).join('')}<button class="btn primary" style="margin-top:14px">Salvar colaborador</button></form><div>${c.collaborators.map(x=>`<div class="card"><div class="section-head"><div><h3>${esc(x.name)}</h3><p>${esc(x.phone)} • ${x.active===false?'Inativo':'Ativo'}</p></div><div class="actions"><button class="btn small" onclick="editCollaborator('${x.id}')">Editar</button><button class="btn small danger" onclick="removeCollaborator('${x.id}')">Remover</button></div></div>${DAYS.map((d,i)=>x.schedule?.[i]?.length?`<p><b>${d}:</b> ${x.schedule[i].join(', ')}</p>`:'').join('')}</div>`).join('')||'<div class="empty">Nenhum colaborador cadastrado.</div>'}</div>`}
let scheduleDraft={};function addTime(day){const input=document.getElementById('dayInput'+day),v=input.value;if(!v)return;scheduleDraft[day]=[...(scheduleDraft[day]||[]),v].filter((x,i,a)=>a.indexOf(x)===i).sort();input.value='';renderDayChips(day)}function renderDayChips(day){const box=document.getElementById('dayChips'+day);if(box)box.innerHTML=(scheduleDraft[day]||[]).map(t=>`<span class="chip">${t}<button type="button" onclick="removeTime(${day},'${t}')">×</button></span>`).join('')}function removeTime(day,t){scheduleDraft[day]=(scheduleDraft[day]||[]).filter(x=>x!==t);renderDayChips(day)}
function saveCollaborator(e){e.preventDefault();const c=company(),cid=collabId.value,data={id:cid||id(),name:collabName.value.trim(),phone:onlyNumbers(collabPhone.value),active:collabActive.checked,schedule:JSON.parse(JSON.stringify(scheduleDraft))};if(cid)c.collaborators=c.collaborators.map(x=>x.id===cid?data:x);else c.collaborators.push(data);scheduleDraft={};save();renderTab();toast('Colaborador salvo.')}function editCollaborator(cid){const x=company().collaborators.find(v=>v.id===cid);collabId.value=x.id;collabName.value=x.name;collabPhone.value=x.phone;collabActive.checked=x.active!==false;scheduleDraft=JSON.parse(JSON.stringify(x.schedule||{}));DAYS.forEach((_,i)=>renderDayChips(i));window.scrollTo({top:0,behavior:'smooth'})}function removeCollaborator(cid){if(!confirm('Remover colaborador?'))return;company().collaborators=company().collaborators.filter(x=>x.id!==cid);save();renderTab()}
function appearanceTab(){const c=company(),t=c.theme;return `<h1>Aparência e dados da empresa</h1><form class="card" onsubmit="saveAppearance(event)"><div class="form-grid"><div class="field"><label>Nome da empresa</label><input id="aName" value="${esc(c.name)}"></div><div class="field"><label>Segmento</label><input id="aCategory" value="${esc(c.category)}"></div><div class="field"><label>WhatsApp principal</label><input id="aPhone" value="${esc(c.phone)}"></div><div class="field"><label>Logo</label><input id="aLogo" type="file" accept="image/*"></div><div class="field"><label>Banner</label><input id="aBanner" type="file" accept="image/*"></div><div class="field full"><label>Descrição</label><textarea id="aDescription">${esc(c.description)}</textarea></div></div><h3>Personalização dos cards e formulário</h3><div class="color-grid">${colorField('pageBg','Fundo da área de serviços',t.pageBg)}${colorField('cardBg','Fundo dos cards',t.cardBg)}${colorField('cardText','Letras dos cards',t.cardText)}${colorField('buttonBg','Fundo dos botões',t.buttonBg)}${colorField('buttonText','Letras dos botões',t.buttonText)}${colorField('formBg','Fundo do formulário',t.formBg)}${colorField('formText','Letras do formulário',t.formText)}</div><button class="btn primary" style="margin-top:16px">Salvar personalização</button></form>`}function colorField(id,label,val){return `<div class="color-item"><label>${label}</label><input id="${id}" type="color" value="${val}"></div>`}
function saveAppearance(e){e.preventDefault();const c=company();c.name=aName.value;c.category=aCategory.value;c.phone=onlyNumbers(aPhone.value);c.description=aDescription.value;c.theme={pageBg:pageBg.value,cardBg:cardBg.value,cardText:cardText.value,buttonBg:buttonBg.value,buttonText:buttonText.value,formBg:formBg.value,formText:formText.value};const files=[['logo',aLogo.files[0]],['banner',aBanner.files[0]]].filter(x=>x[1]);if(!files.length){save();renderDashboard();toast('Personalização salva.');return}let done=0;files.forEach(([k,f])=>fileData(f,data=>{c[k]=data;if(++done===files.length){save();renderDashboard();toast('Personalização salva.')}}))}
function companiesTab(){return `<h1>Empresas cadastradas</h1><form class="card form-grid" onsubmit="saveCompanySupport(event)"><div class="field"><label>Nome</label><input id="scName" required></div><div class="field"><label>Segmento</label><input id="scCategory" required></div><div class="field"><label>Usuário</label><input id="scLogin" required></div><div class="field"><label>Senha</label><input id="scPass" value="123456" required></div><div class="field full"><label>WhatsApp</label><input id="scPhone"></div><button class="btn primary full">Criar empresa</button></form><div class="table-wrap"><table class="table"><thead><tr><th>Empresa</th><th>Login</th><th>Serviços</th><th>Colaboradores</th><th>Ações</th></tr></thead><tbody>${state.companies.map(c=>`<tr><td>${esc(c.name)}<br><small>${esc(c.category)}</small></td><td>${esc(c.login)}</td><td>${c.services.length}</td><td>${c.collaborators.length}</td><td><button class="btn small danger" onclick="removeCompany('${c.id}')">Remover</button></td></tr>`).join('')}</tbody></table></div>`}function saveCompanySupport(e){e.preventDefault();state.companies.push({id:id(),name:scName.value,category:scCategory.value,login:scLogin.value,pass:scPass.value,phone:onlyNumbers(scPhone.value),logo:'',banner:'',description:'Nova empresa cadastrada na plataforma.',theme:{...defaultTheme},services:[],collaborators:[]});save();renderTab();toast('Empresa criada.')}function removeCompany(cid){if(!confirm('Remover empresa e todos os seus agendamentos?'))return;state.companies=state.companies.filter(x=>x.id!==cid);state.appointments=state.appointments.filter(x=>x.companyId!==cid);save();renderTab()}
renderPublic();
</script>
</body>
